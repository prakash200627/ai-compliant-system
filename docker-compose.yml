services:
  backend:
    build: ./backend
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  